<!DOCTYPE html>
<html lang="ja">
<head>
<meta name="robots" content="noindex,nofollow">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>🌻 ほのちゃんの夏休みダッシュボード</title>
<style>
:root{
  --bg1:#fff2f8; --bg2:#eaf4ff; --card:#fff; --ink:#4a3a44; --sub:#9b8893;
  --pink:#f48fb6; --pink-d:#e26b9a; --mint:#3fb89e; --blue:#5a9fe0; --lav:#a98fe0;
  --gold:#f4b740; --line:#f3e4ed; --good:#54c08a; --shadow:0 6px 20px rgba(190,120,160,.16);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Hiragino Maru Gothic ProN','Hiragino Kaku Gothic ProN',-apple-system,sans-serif;
  background:linear-gradient(165deg,var(--bg1),var(--bg2));color:var(--ink);line-height:1.6;
  font-size:15px;padding-bottom:60px;min-height:100vh}
.wrap{max-width:600px;margin:0 auto;padding:16px 14px}

/* ヘッダー */
.head{background:linear-gradient(135deg,#fbb1cd,#b79fe6 75%);color:#fff;border-radius:26px;
  padding:22px 22px;box-shadow:var(--shadow);margin-bottom:14px;position:relative;overflow:hidden}
.head::after{content:"🌻";position:absolute;right:-8px;bottom:-14px;font-size:88px;opacity:.20}
.head h1{font-size:21px;font-weight:800;margin-bottom:8px;letter-spacing:.3px}
.head .goal{display:inline-block;background:rgba(255,255,255,.30);border-radius:20px;padding:6px 16px;font-size:13px;font-weight:800}
.head .date{font-size:12.5px;margin-top:10px;opacity:.97;font-weight:700}
.head .cheer{margin-top:10px;background:rgba(255,255,255,.9);color:var(--pink-d);border-radius:16px;padding:9px 14px;font-size:13.5px;font-weight:800;position:relative;z-index:1}

/* 今日のカード */
.today{background:var(--card);border-radius:26px;padding:6px;box-shadow:0 8px 26px rgba(226,107,154,.2);margin-bottom:16px}
.today .inner{border:2px dashed #f3c6da;border-radius:22px;padding:16px 14px}
.today.alldone .inner{border-color:#bfe8d2;background:#f4fbf7}
.today .tag{display:inline-block;background:#ffe3ef;color:var(--pink-d);font-size:12px;font-weight:800;border-radius:14px;padding:4px 13px;margin-bottom:8px}
.today .dtitle{font-size:18px;font-weight:800;color:var(--pink-d);margin-bottom:3px}
.today .lead{font-size:12.5px;color:var(--sub);margin-bottom:6px;font-weight:700}
.today .pbar{height:9px;background:#f1e6ec;border-radius:6px;overflow:hidden;margin:10px 0 14px}
.today .pfill{height:100%;background:linear-gradient(90deg,#f48fb6,#a98fe0);width:0;border-radius:6px;transition:width .5s}

.task{display:flex;align-items:center;gap:11px;padding:12px;border-radius:18px;margin-bottom:10px}
.task.amn{background:#fff6e9}.task.eng{background:#e7f7f2}.task.mat{background:#eaf2fc}
.task .ic{width:44px;height:44px;border-radius:15px;display:flex;align-items:center;justify-content:center;font-size:23px;flex-shrink:0;background:#fff;box-shadow:0 2px 6px rgba(0,0,0,.05)}
.task .body{flex:1;min-width:0}
.task .nm{font-size:11px;font-weight:800}
.task.amn .nm{color:#e0962f}.task.eng .nm{color:#2faa90}.task.mat .nm{color:#4f8fd6}
.task .ti{font-size:14.5px;font-weight:800;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.task .acts{display:flex;gap:6px;margin-top:7px;flex-wrap:wrap}
.go{font-size:12.5px;font-weight:800;color:#fff;border-radius:16px;padding:6px 16px;text-decoration:none;white-space:nowrap}
.task.amn .go{background:#eaa33f}.task.eng .go{background:#2faa90}.task.mat .go{background:#4f8fd6}
.go.g2{opacity:.78}
.go.soon{background:#cdbfc8 !important}
.chk{width:52px;height:52px;border-radius:50%;border:3px solid #efdbe6;background:#fff;font-size:12px;font-weight:800;color:#cbb3c1;flex-shrink:0;cursor:pointer;line-height:1.1;transition:.18s}
.chk.on{background:var(--good);border-color:var(--good);color:#fff;transform:scale(1.08)}
.celebrate{text-align:center;font-size:16px;font-weight:800;color:var(--good);padding:8px 0 2px}

/* スタンプ帳 */
.stamp{background:var(--card);border-radius:22px;padding:16px 18px;box-shadow:var(--shadow);margin-bottom:16px}
.stamp .sh{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.stamp .sh .t{font-size:15px;font-weight:800;color:var(--lav)}
.stamp .sh .c{font-size:13px;font-weight:800;color:var(--pink-d)}
.sgrid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}
.cell{aspect-ratio:1;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:19px;background:#faf0f5;color:#cba9bd;font-weight:800}
.cell.done{background:linear-gradient(135deg,#ffe0ee,#ffd2e8)}
.cell.today{border:3px solid var(--pink-d);color:var(--pink-d);background:#fff}

/* 全日程 */
.cal{background:var(--card);border-radius:20px;box-shadow:var(--shadow);overflow:hidden;margin-bottom:14px}
.cal-h{padding:15px 18px;font-size:14.5px;font-weight:800;color:var(--lav);cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.cal-b{padding:0 12px 12px;display:none}
.drow{display:flex;align-items:center;gap:10px;padding:11px 10px;border-top:1px solid var(--line);font-size:13px}
.drow.today{background:#fff6fa;border-radius:14px;border-top-color:transparent}
.drow .dn{min-width:72px;font-weight:800;color:var(--pink-d);font-size:11.5px}
.drow .dl{flex:1;color:#6a5a63;font-size:12px}
.drow .mk{font-size:17px;min-width:24px;text-align:center}
.foot{text-align:center;font-size:12.5px;color:var(--sub);padding:12px;font-weight:700;line-height:1.9}
</style>
</head>
<body>
<div class="wrap">

  <div class="head">
    <h1>🌻 ほのちゃんの夏休みダッシュボード</h1>
    <div class="goal">めざせ！ とっくん選抜クラス 合格 ✨</div>
    <div class="date" id="headDate">　</div>
    <div class="cheer" id="cheerMsg">　</div>
  </div>

  <div id="todayBox"></div>

  <div class="stamp">
    <div class="sh"><span class="t">🌸 がんばりスタンプ帳</span><span class="c" id="stampCnt">0 / 30</span></div>
    <div class="sgrid" id="stampGrid"></div>
  </div>

  <div class="cal">
    <div class="cal-h" onclick="toggleCal()"><span>📅 ぜんぶの日程（7/18〜30日）</span><span id="calTgl">ひらく ＋</span></div>
    <div class="cal-b" id="calBody"></div>
  </div>

  <div class="foot">毎日ここを開いて、3つできたら 🌸<br>むりせず、できる分だけでだいじょうぶ。</div>

</div>

<script>
/* ===== 設定（すべてGlobで実在確認したファイルのみ） ===== */
var START=new Date(2026,6,18);            // 夏休み初日 7/18(土)
var TOTAL_DAYS=30;
var WD=['日','月','火','水','木','金','土'];
var AMN_WD=['月','火','水','木','金'];
var PRE_AMN='プリント/暗記カード/';
var PRE_ENG='プリント/英語基礎/';
var PRE_MAT='プリント/夏_特訓数学プリント/';
var CHEERS=[
 'きょうもコツコツ、えらい！🌸','1個できたら大成功！✨','つづけるあなたが最強💪',
 'むりせず、できる分でOK🍀','とっくん選抜、ぜったいいけるよ！','きのうの自分をこえよう🌟',
 'がんばりは、ぜんぶ未来の力💕','ちょっとずつで、ちゃんと進んでる🌱','えがおでいこう😊','今日のあなたも、すてき🌷'
];
var EG=[
 ['U1_be動詞_基礎深化.html','U1 be動詞'],['U2_一般動詞_基礎深化.html','U2 一般動詞'],
 ['U3_三単現_基礎深化.html','U3 三単現'],['U4_名詞の複数形_基礎深化.html','U4 複数形'],
 ['U5_代名詞_基礎深化.html','U5 代名詞'],['U6_can_基礎深化.html','U6 can'],
 ['U7_命令文_基礎深化.html','U7 命令文'],['U8_疑問詞_基礎深化.html','U8 疑問詞'],
 ['U9_形容詞副詞_基礎深化.html','U9 形容詞・副詞'],['U10_前置詞_基礎深化.html','U10 前置詞']
];
var MA=[
 ['特訓P1_正負の数_L3L4.html','P1 正負の数'],['特訓P1b_正負の数_計算精度ドリル.html','P1b 正負の計算'],
 ['特訓P2a_文字式_演習.html','P2a 文字式'],['特訓P2b_文字式_特訓_立式.html','P2b 文字式の立式'],
 ['特訓P2c_文字式_計算精度ドリル.html','P2c 文字式の計算'],['特訓P3_方程式の解法_演習.html','P3 方程式の解き方'],
 ['特訓P3b_方程式の解法_ドリル.html','P3b 方程式ドリル'],['特訓P4_文章を式に1_型カード_個数過不足.html','P4 文章を式に①'],
 ['特訓P4b_文章を式に_個数過不足2.html','P4b 文章を式に②'],['特訓P4c_文章を式に_個数過不足3.html','P4c 文章を式に③'],
 ['特訓P4d_文章を式に_整数比例配分利益.html','P4d 文章を式に④'],['特訓P5_文章を式に2_速さ_割合利益.html','P5 速さと割合'],
 ['特訓P5b_文章を式に_速さ2.html','P5b 速さ②'],['特訓P5c_文章を式に_割合食塩水.html','P5c 割合・食塩水'],
 ['特訓P6_文章を式に3_正負の文章.html','P6 正負の文章'],['特訓P6b_文章を式に_正負文章2.html','P6b 正負の文章②'],
 ['特訓P7_方程式の利用_4型混合演習.html','P7 方程式の利用'],['特訓P7b_方程式の利用_過去問同型.html','P7b 利用・過去問型'],
 ['特訓P7c_方程式の利用_発展L4.html','P7c 利用・発展'],['特訓P8a_図形_演習.html','P8a 図形のきほん'],
 ['特訓P8_複合図形_円_折り返し角.html','P8 複合図形'],['特訓P8b_複合図形L4_砂時計折り返し花びら.html','P8b 複合図形L4'],
 ['特訓P8c_図形角度集中.html','P8c 図形・角度'],['特訓P8d_図形複合面積2.html','P8d 複合面積'],
 ['特訓P8e_円とおうぎ形.html','P8e 円とおうぎ'],['特訓P8f_等積変形面積一定.html','P8f 等積変形'],
 ['特訓P9a_規則性_演習.html','P9a 規則性'],['特訓P9_規則性_n式.html','P9 規則性のn式'],
 ['特訓P9b_規則性L4_タイルn式逆算.html','P9b 規則性L4'],['特訓P9c_規則性碁石マッチ2.html','P9c 碁石・マッチ']
];

/* ===== ユーティリティ ===== */
function pad2(n){return (n<10?'0':'')+n;}
function dateObj(day){ var d=new Date(START); d.setDate(d.getDate()+(day-1)); return d; }
function dateLabel(day){ var d=dateObj(day); return (d.getMonth()+1)+'/'+d.getDate()+'('+WD[d.getDay()]+')'; }
function amnOf(day){ if(day<=5){var w=AMN_WD[day-1];return [w+'_暗記カード.html',w+'_暗記カード_その2.html'];} var nn=pad2(day); return ['Day'+nn+'_その1.html','Day'+nn+'_その2.html']; }
function engOf(day){ return day<=EG.length? EG[day-1] : null; }
function matOf(day){ return day<=MA.length? MA[day-1] : null; }
function todayDay(){ var n=new Date(); var t=new Date(n.getFullYear(),n.getMonth(),n.getDate()); return Math.floor((t-START)/86400000)+1; }
function k(day,s){ return 'hns_d'+day+'_'+s; }
function isOn(day,s){ return localStorage.getItem(k(day,s))==='1'; }
function setOn(day,s,v){ if(v)localStorage.setItem(k(day,s),'1'); else localStorage.removeItem(k(day,s)); }
function subjList(day){ var a=['amn','mat']; if(engOf(day)) a.splice(1,0,'eng'); return a; }
function dayAllDone(day){ return subjList(day).every(function(s){return isOn(day,s);}); }
function countDone(){ var c=0; for(var d=1;d<=TOTAL_DAYS;d++){ if(dayAllDone(d))c++; } return c; }

/* ===== 今日のカード ===== */
function goBtn(pre,file,label,cls){ return file? '<a class="go '+(cls||'')+'" href="'+pre+file+'">'+label+'</a>' : '<span class="go soon">じゅんび中</span>'; }
function taskRow(day,s){
  var on=isOn(day,s),html='';
  if(s==='amn'){ var f=amnOf(day); html='<div class="task amn"><div class="ic">📕</div><div class="body"><div class="nm">あんき</div><div class="ti">Day'+pad2(day)+'　たんご＋かんじ</div><div class="acts">'+goBtn(PRE_AMN,f[0],'その1')+goBtn(PRE_AMN,f[1],'その2','g2')+'</div></div>'; }
  else if(s==='eng'){ var e=engOf(day); html='<div class="task eng"><div class="ic">📗</div><div class="body"><div class="nm">えいご</div><div class="ti">'+e[1]+'</div><div class="acts">'+goBtn(PRE_ENG,e[0],'ひらく')+'</div></div>'; }
  else { var m=matOf(day); html='<div class="task mat"><div class="ic">📘</div><div class="body"><div class="nm">すうがく</div><div class="ti">'+(m?m[1]:'（おやすみ）')+'</div><div class="acts">'+(m?goBtn(PRE_MAT,m[0],'ひらく'):'')+'</div></div>'; }
  html+='<button class="chk'+(on?' on':'')+'" onclick="toggle('+day+',\''+s+'\')">'+(on?'✓<br>できた':'やる！')+'</button></div>';
  return html;
}
function renderToday(){
  var day=todayDay(), box=document.getElementById('todayBox'), disp, before=false, after=false;
  if(day<1){ disp=1; before=true; } else if(day>TOTAL_DAYS){ after=true; } else { disp=day; }
  if(after){ box.innerHTML='<div class="today alldone"><div class="inner"><span class="tag">おつかれさま</span><div class="dtitle">🌸 '+TOTAL_DAYS+'日間 よくがんばったね！</div><div class="lead">あとは まちがえた問題の見直しと、とっくん演習をやろう。</div></div></div>'; return; }
  var subs=subjList(disp), done=subs.filter(function(s){return isOn(disp,s);}).length, all=subs.length, allDone=(done===all);
  var h='<div class="today'+(allDone&&!before?' alldone':'')+'"><div class="inner">';
  if(before){ h+='<span class="tag">もうすぐ夏休み 🌻</span><div class="dtitle">7/18(土) スタート！</div><div class="lead">1日目はこんなメニュー。今からのぞいて、やってみてもOK！</div>'; }
  else { h+='<span class="tag">きょうのメニュー</span><div class="dtitle">📅 '+dateLabel(disp)+'（'+disp+'日目）</div><div class="lead">この'+all+'つをやろう。できたら右の○をタップ！</div>'; }
  h+='<div class="pbar"><div class="pfill" style="width:'+(all?Math.round(done/all*100):0)+'%"></div></div>';
  subs.forEach(function(s){ h+=taskRow(disp,s); });
  if(allDone&&!before) h+='<div class="celebrate">🌸 きょうのぶん、ぜんぶできた！すごい！</div>';
  h+='</div></div>'; box.innerHTML=h;
}
function toggle(day,s){ setOn(day,s,!isOn(day,s)); renderToday(); renderStamp(); renderCal(); }

/* ===== スタンプ帳 ===== */
function renderStamp(){
  var td=todayDay(), h='', done=0;
  for(var d=1; d<=TOTAL_DAYS; d++){
    var cls='cell', inner=d;
    if(dayAllDone(d)){ cls+=' done'; inner='🌸'; done++; }
    else if(d===td){ cls+=' today'; }
    h+='<div class="'+cls+'">'+inner+'</div>';
  }
  document.getElementById('stampGrid').innerHTML=h;
  document.getElementById('stampCnt').textContent=done+' / '+TOTAL_DAYS;
}

/* ===== 全日程 ===== */
function renderCal(){
  var td=todayDay(), h='';
  for(var d=1; d<=TOTAL_DAYS; d++){
    var e=engOf(d), m=matOf(d);
    var label='英 '+(e?e[1].replace(/^U\d+ /,''):'復習')+'　/　数 '+(m?m[1].replace(/^P\w+ /,''):'おやすみ');
    var mk=dayAllDone(d)?'🌸':(subjList(d).some(function(s){return isOn(d,s);})?'🖊️':'');
    h+='<div class="drow'+(d===td?' today':'')+'"><span class="dn">'+dateLabel(d)+'</span><span class="dl">'+label+'</span><span class="mk">'+mk+'</span></div>';
  }
  document.getElementById('calBody').innerHTML=h;
}
function toggleCal(){ var b=document.getElementById('calBody'); var op=(b.style.display==='none'); b.style.display=op?'block':'none'; document.getElementById('calTgl').textContent=op?'とじる －':'ひらく ＋'; }

/* ===== 起動 ===== */
(function(){
  var n=new Date();
  document.getElementById('headDate').textContent='きょうは '+(n.getMonth()+1)+'月'+n.getDate()+'日（'+WD[n.getDay()]+'）';
  document.getElementById('cheerMsg').textContent=CHEERS[n.getDate()%CHEERS.length];
  renderToday(); renderStamp(); renderCal();
})();
</script>
</body>
</html>
