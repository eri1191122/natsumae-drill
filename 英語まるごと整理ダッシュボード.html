<style>
:root{--g1:#e8f0ea;--g2:#315f3e;--g3:#cfe0d4;--g4:#f5faf6;--ink:#283b30;--warn:#b3402f;--blue:#31415f}
*{box-sizing:border-box}
body{font-family:-apple-system,"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;margin:0;background:#f0f5f1;color:var(--ink);-webkit-text-size-adjust:100%}
header{background:var(--g1);padding:14px 16px;border-bottom:3px solid var(--g2);position:sticky;top:0;z-index:20}
h1{font-size:19px;margin:0 0 8px;color:var(--g2)}
.summary{display:flex;gap:10px;flex-wrap:wrap;font-size:14px}
.summary .pill{background:#fff;border:1.5px solid var(--g3);border-radius:999px;padding:5px 13px;font-weight:800;color:var(--g2)}
.summary .pill b{color:var(--warn);font-size:16px}
.tabs{display:flex;gap:6px;margin-top:10px}
.tab{flex:1;padding:11px 6px;text-align:center;font-weight:900;font-size:15px;border:1.5px solid var(--g3);border-radius:10px 10px 0 0;background:#fff;color:var(--g2);cursor:pointer}
.tab.active{background:var(--g2);color:#fff;border-color:var(--g2)}
main{max-width:840px;margin:0 auto;padding:12px 12px 80px}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin:10px 0;position:sticky;top:128px;background:#f0f5f1;padding:6px 0;z-index:10}
.toolbar input[type=search]{flex:1;min-width:140px;padding:10px 12px;border:1.5px solid var(--g3);border-radius:10px;font-size:15px}
.filters{display:flex;gap:5px;flex-wrap:wrap}
.fbtn{padding:7px 12px;border:1.5px solid var(--g3);border-radius:999px;background:#fff;font-weight:800;font-size:13px;color:var(--g2);cursor:pointer}
.fbtn.active{background:var(--g2);color:#fff;border-color:var(--g2)}
.selftest{display:flex;align-items:center;gap:6px;font-weight:800;font-size:13px;color:var(--g2);background:#fff;border:1.5px solid var(--g3);border-radius:999px;padding:6px 12px;cursor:pointer;user-select:none}
.selftest input{width:18px;height:18px}
details.acc{border:1.5px solid var(--g3);border-radius:12px;margin:8px 0;background:#fff;overflow:hidden}
details.acc>summary{padding:12px 14px;font-weight:900;font-size:15px;color:var(--g2);background:var(--g4);cursor:pointer;list-style:none}
details.acc>summary::-webkit-details-marker{display:none}
details.acc>summary::before{content:"▸ ";color:var(--g2)}
details.acc[open]>summary::before{content:"▾ "}
.acc-body{padding:6px 10px 12px}
.item{display:flex;flex-wrap:wrap;align-items:center;gap:8px;padding:11px 8px;border-bottom:1px solid #eef3ef}
.item:last-child{border-bottom:none}
.item .ja{font-weight:800;font-size:15.5px;color:var(--blue);min-width:42%;flex:1}
.item .en{font-weight:900;font-size:16px;color:var(--g2);letter-spacing:.3px}
.en.hidden{background:var(--g2);color:transparent;border-radius:5px;cursor:pointer;padding:0 8px}
.en.hidden::after{content:"タップ";color:#fff;font-size:11px;letter-spacing:0}
.badge{font-size:11px;font-weight:800;padding:2px 8px;border-radius:999px;background:var(--g1);color:var(--g2);border:1px solid var(--g3)}
.badge.g5{background:#e3f0ff;color:#1e5aa8;border-color:#bcd8f5}
.badge.g4{background:#e6f7ea;color:#1f7a3d;border-color:#bfe6c9}
.badge.g3{background:#fdeede;color:#9a5b16;border-color:#f3d4a8}
.badge.range{background:#fde8e4;color:var(--warn);border-color:#f3c4ba}
.links{display:flex;gap:5px;flex-wrap:wrap}
.jump{font-size:12px;font-weight:800;color:#fff;background:var(--g2);text-decoration:none;padding:5px 10px;border-radius:8px;white-space:nowrap}
.jump.small{background:#5a7d65;font-size:11px;padding:4px 8px}
.cnt{font-size:11px;color:#6c7d72;font-weight:700}
.ox{display:flex;gap:4px;margin-left:auto}
.oxb{width:38px;height:38px;border-radius:9px;border:1.5px solid var(--g3);background:#fff;font-size:18px;font-weight:900;cursor:pointer;line-height:1}
.oxb.o.on{background:#1f7a3d;color:#fff;border-color:#1f7a3d}
.oxb.x.on{background:var(--warn);color:#fff;border-color:var(--warn)}
.gcard{border:1.5px solid var(--g3);border-radius:14px;background:#fff;padding:14px;margin:10px 0}
.gcard .gtop{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
.gcard .unum{font-size:13px;font-weight:900;color:#fff;background:var(--g2);border-radius:8px;padding:3px 9px}
.gcard .gname{font-size:17px;font-weight:900;color:var(--blue)}
.gcard .gdesc{font-size:14px;color:#4a5b50;margin:8px 0}
.gcard .gbadges{display:flex;gap:5px;flex-wrap:wrap;margin:6px 0}
.gcard .gfoot{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:8px}
.hint{font-size:12.5px;color:#6c7d72;margin:6px 2px}
.empty{padding:30px 10px;text-align:center;color:#8a9a8f;font-weight:700}
.pane{display:none}
.pane.active{display:block}
@media(max-width:480px){.item .ja{min-width:100%}.item .en{font-size:15px}}
</style>

const KP = 'engdash_';
function load(k){try{return localStorage.getItem(KP+k)||''}catch(e){return ''}}
function save(k,v){try{if(v)localStorage.setItem(KP+k,v);else localStorage.removeItem(KP+k)}catch(e){}}
function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}

function gradeBadge(g){
  if(!g)return '';
  let cls = g.indexOf('5')>=0?'g5':g.indexOf('4')>=0?'g4':g.indexOf('3')>=0?'g3':'';
  return `<span class="badge ${cls}">${esc(g)}</span>`;
}
function oxButtons(key){
  const v = load(key);
  return `<div class="ox" data-key="${esc(key)}">
    <button class="oxb o ${v==='o'?'on':''}" data-v="o">○</button>
    <button class="oxb x ${v==='x'?'on':''}" data-v="x">✕</button></div>`;
}
function linkHtml(links,small){
  if(!links||!links.length) return '<span class="cnt">出題プリント無し</span>';
  if(links.length===1) return `<a class="jump${small?' small':''}" href="${esc(links[0].file)}">▶ 開く</a>`;
  let s = `<span class="cnt">出題 ${links.length}枚:</span><span class="links">`;
  links.forEach((l,i)=> s += `<a class="jump small" href="${esc(l.file)}">▶${i+1}</a>`);
  return s + '</span>';
}

// ── 単語タブ ──
function renderWords(){
  const host = document.getElementById('pane-word');
  // 級グループ化
  const order = ['5級','4級','3級','級外'];
  const groups = {};
  DATA.words.forEach(w=>{
    let g = w.grade || '級外';
    (groups[g]=groups[g]||[]).push(w);
  });
  let html = '<div class="hint">日本語の意味を見て英語を思い出そう。「つづりを隠す」をONにすると自己テストになるよ。</div>';
  order.forEach(g=>{
    const arr = groups[g]; if(!arr) return;
    html += `<details class="acc" data-grade="${g}"><summary>${g}（${arr.length}語）</summary><div class="acc-body">`;
    arr.forEach(w=> html += wordItem(w));
    html += '</div></details>';
  });
  host.innerHTML = html;
}
function wordItem(w){
  const key = 'w_'+w.key;
  const meaning = w.ja ? esc(w.ja) : '<span class="cnt">（意味未取得）</span>';
  return `<div class="item" data-search="${esc((w.ja+' '+w.en).toLowerCase())}" data-grade="${w.grade||'級外'}">
    <span class="ja">${meaning}</span>
    <span class="en spell">${esc(w.en)}</span>
    ${gradeBadge(w.grade)}
    ${linkHtml(w.links)}
    ${oxButtons(key)}
  </div>`;
}

// ── 熟語タブ ──
function renderPhrases(){
  const host = document.getElementById('pane-phrase');
  const axes = ['A','B','C','D','E','F','G','H','I','J','K'];
  const groups = {};
  DATA.phrases.forEach(p=>{ let a=p.axis||'その他'; (groups[a]=groups[a]||[]).push(p); });
  let html = '<div class="hint">軸＝熟語のなかま分け（A=句動詞 / B=be＋形容詞 / C=動詞＋名詞 / D=前置詞句 ほか）。</div>';
  axes.forEach(a=>{
    const arr=groups[a]; if(!arr)return;
    html += `<details class="acc" data-axis="${a}"><summary>軸 ${a}（${arr.length}）</summary><div class="acc-body">`;
    arr.forEach(p=> html += phraseItem(p));
    html += '</div></details>';
  });
  if(groups['その他']){
    const arr=groups['その他'];
    html += `<details class="acc" data-axis="その他"><summary>軸なし（${arr.length}）</summary><div class="acc-body">`;
    arr.forEach(p=> html += phraseItem(p));
    html += '</div></details>';
  }
  host.innerHTML = html;
}
function phraseItem(p){
  const key='p_'+p.key;
  const meaning = p.ja ? esc(p.ja) : '<span class="cnt">（意味未取得）</span>';
  return `<div class="item" data-search="${esc((p.ja+' '+p.en).toLowerCase())}" data-axis="${p.axis||'その他'}">
    <span class="ja">${meaning}</span>
    <span class="en spell">${esc(p.en)}</span>
    ${p.axis?`<span class="badge">軸${esc(p.axis)}</span>`:''}
    ${gradeBadge(p.grade)}
    ${linkHtml(p.links)}
    ${oxButtons(key)}
  </div>`;
}

// ── 文法タブ ──
function renderGrammar(){
  const host = document.getElementById('pane-grammar');
  let html='<div class="hint">U1〜U10が特訓選抜の範囲。U11/U12は範囲外（軽め）。</div>';
  DATA.grammar.forEach(g=>{
    const key='g_'+g.unit;
    const v=load(key);
    const badges = (g.tokkun||[]).map(t=>`<span class="badge">${esc(t)}</span>`).join('');
    const rb = g.out_of_range?'<span class="badge range">範囲外</span>':'';
    html += `<div class="gcard">
      <div class="gtop"><span class="unum">${esc(g.unit)}</span>
        <span class="gname">${esc(g.name)}</span>${rb}</div>
      <div class="gdesc">${esc(g.desc)}</div>
      <div class="gbadges">${badges||'<span class="cnt">特訓大問対応なし</span>'}</div>
      <div class="gfoot">
        ${g.exists?`<a class="jump" href="${esc(g.file)}">▶ プリントを開く</a>`:'<span class="cnt">プリント未配置</span>'}
        ${oxButtons(key)}
      </div></div>`;
  });
  host.innerHTML=html;
}

// ── サマリー集計 ──
function recalc(){
  let wo=0, po=0, go=0;
  DATA.words.forEach(w=>{ if(load('w_'+w.key)==='o')wo++; });
  DATA.phrases.forEach(p=>{ if(load('p_'+p.key)==='o')po++; });
  DATA.grammar.forEach(g=>{ if(load('g_'+g.unit)==='o')go++; });
  document.getElementById('sm-w').innerHTML = `<b>${wo}</b>/${DATA.words.length}`;
  document.getElementById('sm-p').innerHTML = `<b>${po}</b>/${DATA.phrases.length}`;
  document.getElementById('sm-g').innerHTML = `<b>${go}</b>/${DATA.grammar.length}`;
}

// ── イベント（イベント委譲） ──
document.addEventListener('click', e=>{
  const ox = e.target.closest('.oxb');
  if(ox){
    const box=ox.parentElement, key=box.dataset.key, v=ox.dataset.v;
    const cur=load(key);
    const nv = cur===v?'':v;
    save(key,nv);
    box.querySelectorAll('.oxb').forEach(b=>b.classList.toggle('on', b.dataset.v===nv && nv));
    recalc();
    return;
  }
  const sp = e.target.closest('.en.spell.hidden');
  if(sp){ sp.classList.toggle('reveal'); sp.classList.toggle('hidden'); return; }
});

// タブ切替
function switchTab(name){
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.t===name));
  document.querySelectorAll('.pane').forEach(p=>p.classList.toggle('active',p.id==='pane-'+name));
  document.querySelectorAll('.toolbar').forEach(tb=>tb.style.display = tb.dataset.t===name?'flex':'none');
}
document.querySelectorAll('.tab').forEach(t=> t.addEventListener('click',()=>switchTab(t.dataset.t)) );

// 検索＋フィルタ
function applyFilter(pane){
  const tb = document.querySelector(`.toolbar[data-t="${pane}"]`);
  const q = (tb.querySelector('input[type=search]').value||'').toLowerCase().trim();
  const activeF = tb.querySelector('.fbtn.active');
  const fval = activeF?activeF.dataset.f:'all';
  const host = document.getElementById('pane-'+pane);
  const attr = pane==='word'?'grade':'axis';
  host.querySelectorAll('details.acc').forEach(acc=>{
    let shown=0;
    acc.querySelectorAll('.item').forEach(it=>{
      const okF = fval==='all' || (it.dataset[attr]===fval);
      const okQ = !q || (it.dataset.search.indexOf(q)>=0);
      const ok = okF&&okQ;
      it.style.display = ok?'':'none';
      if(ok)shown++;
    });
    const grpVal = acc.dataset[attr];
    const grpMatch = fval==='all' || grpVal===fval;
    acc.style.display = (shown>0 && grpMatch)?'':'none';
    if(q && shown>0) acc.open=true;
  });
}
document.querySelectorAll('.toolbar').forEach(tb=>{
  const pane=tb.dataset.t;
  const si=tb.querySelector('input[type=search]');
  if(si) si.addEventListener('input',()=>applyFilter(pane));
  tb.querySelectorAll('.fbtn').forEach(b=> b.addEventListener('click',()=>{
    tb.querySelectorAll('.fbtn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active'); applyFilter(pane);
  }));
  const st=tb.querySelector('.selftest input');
  if(st) st.addEventListener('change',()=>{
    document.getElementById('pane-'+pane).querySelectorAll('.en.spell').forEach(s=>{
      if(st.checked){ s.classList.add('hidden'); s.classList.remove('reveal'); }
      else { s.classList.remove('hidden','reveal'); }
    });
  });
});

renderGrammar(); renderWords(); renderPhrases(); recalc();
switchTab('grammar');
