  <h1>復習・英語（間違えただけ）</h1>
  <p>日本語を見て、英語を<strong>頭の中で言ってから</strong>「答えを見る」を押そう。合っていたら○、ちがったら✕。○を<strong>2回</strong>連続でとれたら「卒業」＝もう出てこなくなるよ。✕を押すと0からやり直し。短くてOK、毎日ちょっとずつ。</p>
</div>

<script>
// ===== 収録17問（自己完結・隔離試作とは無関係の軽量キュー） =====
// ★day は必ず「M/D」形式（例 6/18）で記入する。「初日／2日目」等の相対表記は禁止（忘却曲線の起算日が不明になるため）。実日付が不明なら、出題日または採点日を入れる。
// id1-11=6/17（夏前ドリル復習01-03の採点分析分・実解答日は記録なしのため分析日に統一）／id12-17=6/18。
// ╔══ 単語を1問ふやすとき（保護者の方へ）══╗
// ① 足すのは必ず配列のいちばん下（];の直前）。途中に入れない（卒業記録がずれる）
// ② 下のひな型をコピーして書きかえる。badge は tango(単語)/jukugo(熟語)/eisaku(英作文)
// ③ id は書かなくてOK（自動でつく）／day は「6/21」の形／前の行のおしりに「,」を必ず
// ── コピー用ひな型（このまま QS の ]; の直前に貼る）──
// ,{kind:'単語', badge:'tango', jp:'日本語', en:'english', day:'6/21',
//   k:'<p><span class="lab">かたまり</span>ここに解説。<span class="red">よくある間違い</span></p>'}
// ╚════════════════════════════════╝
var QS=[
 {id:1, kind:'熟語', badge:'jukugo', jp:'～を聞く', en:'listen to', day:'6/17',
  k:'<p><span class="lab">かたち</span>「listen（聞く）＋ to」で1セット。<span class="red">to を落とすと×</span>。英語では「○○を聞く」の「を」が <span class="chunk">to</span> になるよ。</p><p>例：I listen to music.（わたしは音楽を聞く）／× I listen music.</p>'},

 {id:2, kind:'英作文', badge:'eisaku', jp:'私は中学生です。', en:'I am a junior high school student.', day:'6/17',
  k:'<p><span class="lab">語順</span>主語 <span class="chunk">I</span> → be動詞 <span class="chunk">am</span> → なに <span class="chunk">a junior high school student</span>。</p><p><span class="red">a を忘れない</span>：「1人の生徒」だから数えられる名詞には a がつく。<span class="red">最後はピリオド「.」</span>を必ず。</p><p>junior high school（中学校）＝3語でひとかたまり。そのうしろに student（生徒）。</p>'},

 {id:3, kind:'単語', badge:'tango', jp:'朝', en:'morning', day:'6/17',
  k:'<p><span class="lab">かたまり</span><span class="chunk">mor + ning</span>。「モー・ニング」と区切って覚える。</p><p><span class="red">mourning（喪に服す）と書かない</span>：u は入らない。朝は m-o-r-n-i-n-g。</p><p>in the morning（朝に）でよく使うよ。</p>'},

 {id:4, kind:'単語', badge:'tango', jp:'朝食', en:'breakfast', day:'6/17',
  k:'<p><span class="lab">かたまり</span><span class="chunk">break + fast</span>＝「break（やぶる）＋ fast（断食）」＝夜の絶食をやぶる食事＝朝ごはん。</p><p><span class="red">brekfast と書かない</span>：a を落としがち。break（ブレイク）がそのまま入っている、と覚える。</p>'},

 {id:5, kind:'単語', badge:'tango', jp:'家族', en:'family', day:'6/17',
  k:'<p><span class="lab">かたまり</span><span class="chunk">fam + i + ly</span>。「ファ・ミ・リー」の3つ。</p><p><span class="red">familly と l を2つ書かない</span>：l は1つだけ。fam-i-ly。</p>'},

 {id:6, kind:'熟語', badge:'jukugo', jp:'～出身だ・～から来る', en:'come from', day:'6/17',
  k:'<p><span class="lab">かたち</span>「come（来る）＋ from（～から）」。<span class="red">from を落とすと×</span>。「～から」が <span class="chunk">from</span>。</p><p>例：I come from Tokyo.（わたしは東京出身です）。出身を言うときの定番。</p>'},

 {id:7, kind:'熟語', badge:'jukugo', jp:'目が覚める', en:'wake up', day:'6/17',
  k:'<p><span class="lab">かたち</span>「wake（覚める）＋ up」で1セット。<span class="red">up を落とすと×</span>。</p><p><span class="red">wake up（目が覚める）↔ get up（起き上がる）</span>の対比に注意。目が開くのが wake up、ベッドから出るのが get up。</p>'},

 {id:8, kind:'英作文', badge:'eisaku', jp:'あなたはサッカーファンですか。', en:'Are you a soccer fan?', day:'6/17',
  k:'<p><span class="lab">かたち</span>be動詞の疑問文。ふつうの文 <span class="chunk">You are a soccer fan.</span> の <span class="red">are を主語の前に出す</span> → <span class="chunk">Are you a soccer fan?</span></p><p><span class="lab">手順</span>①You are ～ を作る ②are を文のいちばん前へ ③最後は <span class="red">「?」</span>（クエスチョンマーク）。</p><p>サッカーファン＝<span class="chunk">a soccer fan</span>（数えられる1人なので <span class="red">a</span> を忘れない）。<span class="red">Do you ～? にしない</span>＝be動詞の文なので are を使う。</p>'},

 {id:9, kind:'単語', badge:'tango', jp:'人々', en:'people', day:'6/17',
  k:'<p><span class="lab">かたまり</span><span class="chunk">peo + ple</span>。「ピー・プル」。これ自体が「たくさんの人」を表すので、ふだん s はつけない。</p><p><span class="red">pole（棒）と書かない</span>：people は o の前に e が入る。p-e-o-p-l-e。</p>'},

 {id:10, kind:'単語', badge:'tango', jp:'国', en:'country', day:'6/17',
  k:'<p><span class="lab">かたまり</span><span class="chunk">coun + try</span>。「カン・トリー」。</p><p><span class="red">cuntry と書かない</span>：o を落とさない。coun（カウン）＋ try（トライ）。</p>'},

 {id:11, kind:'熟語', badge:'jukugo', jp:'（電源を）消す', en:'turn off', day:'6/17',
  k:'<p><span class="lab">かたち</span>「turn（まわす）＋ off（切る）」。<span class="red">off を落とすと×</span>。</p><p><span class="red">turn on（つける）↔ turn off（消す）</span>の対比に注意。on が「つく」、off が「切れる」。テレビ・電気のスイッチをイメージ。</p>'},

 {id:12, kind:'単語', badge:'tango', jp:'図書館', en:'library', day:'6/18',
  k:'<p><span class="lab">かたまり</span><span class="chunk">li + bra + ry</span>。「ライ・ブラ・リー」と3つに区切る。</p><p><span class="red">r が2つ</span>入るのがポイント＝「libr-ar-y」。<span class="red">libary と書かない</span>（r を1つにする間違いが多い）。本をたくさん借りる場所、とセットで覚える。</p>'},

 {id:13, kind:'単語', badge:'tango', jp:'病院', en:'hospital', day:'6/18',
  k:'<p><span class="lab">かたまり</span><span class="chunk">hos + pi + tal</span>。「ホス・ピ・タル」。</p><p>さいごは <span class="chunk">tal</span>（-tle ではない）。<span class="red">hospitle・hospitol と書かない</span>。まん中は <span class="chunk">pi</span>、さいごは <span class="chunk">tal</span>。</p>'},

 {id:14, kind:'単語', badge:'tango', jp:'質問', en:'question', day:'6/18',
  k:'<p><span class="lab">かたまり</span><span class="chunk">ques + tion</span>。「クエス・チョン」。</p><p><span class="red">q のあとは必ず u</span>（<span class="chunk">qu</span> でいつもセット）。さいごは <span class="chunk">tion</span>。<span class="red">qestion（u を落とす）・queston（i を落とす）と書かない</span>。</p>'},

 {id:15, kind:'熟語', badge:'jukugo', jp:'（服などを）着る・身につける', en:'put on', day:'6/18',
  k:'<p><span class="lab">かたち</span>「put（置く）＋ on（体の上に）」＝服を体の上に置く＝<span class="red">着る</span>。<span class="red">on を落とすと×</span>。</p><p>反対は <span class="chunk">take off</span>（脱ぐ）。例：Put on your jacket.（上着を着て）</p>'},

 {id:16, kind:'熟語', badge:'jukugo', jp:'（服などを）脱ぐ／（飛行機が）とびたつ', en:'take off', day:'6/18',
  k:'<p><span class="lab">かたち</span>「take（取る）＋ off（はなす）」＝着ているものを取り去る＝<span class="red">脱ぐ</span>。<span class="red">off を落とすと×</span>。</p><p>反対は <span class="chunk">put on</span>（着る）。飛行機なら「とびたつ（離陸する）」の意味にもなる。例：Take off your shoes.（くつを脱いで）</p>'},

 {id:17, kind:'熟語', badge:'jukugo', jp:'～をさがす', en:'look for', day:'6/18',
  k:'<p><span class="lab">かたち</span>「look（見る）＋ for（～を求めて）」＝<span class="red">さがす</span>。<span class="red">for を落とすと×</span>。</p><p><span class="red">look at（～を見る）と区別</span>：「さがす」は <span class="chunk">for</span>、「（じっと）見る」は <span class="chunk">at</span>。例：I look for my key.（かぎをさがす）</p>'},

 {id:18, kind:'単語', badge:'tango', jp:'答え・答える', en:'answer', day:'6/19',
  k:'<p><span class="lab">かたまり</span><span class="chunk">ans + wer</span>。「アン・サー」。</p><p><span class="red">w を忘れない</span>：a-n-s-w-e-r。発音しないけど w はちゃんと書く。<span class="red">anser と書かない</span>。question（質問）↔ answer（答え）でセット。</p>'},

 {id:19, kind:'単語', badge:'tango', jp:'100・百', en:'hundred', day:'6/19',
  k:'<p><span class="lab">かたまり</span><span class="chunk">hun + dred</span>。「ハン・ドレッド」。</p><p><span class="red">a を入れない</span>：h-u-n-d-r-e-d。<span class="red">hundread と書かない</span>。dred（ドレッド）のかたまりで覚える。</p>'},

 {id:20, kind:'単語', badge:'tango', jp:'（時間の）分', en:'minute', day:'6/19',

// ===== 英語プリントの×を受け取る器（revq_dyn → QSへmerge）=====
var DYN_KEY='revq_dyn';      // 送り手(英語プリント)が書く配列 [{kind,badge,jp,en,day,k,src}]
var DYN_MAP='revq_dynmap';   // {正規化en: 確定id} 永続マップ（idの安定化）
var DYN_SEQ='revq_dynseq';   // 発番カウンタ（単調増加。idを使い回さない）
function normEn(s){return String(s==null?'':s).toLowerCase().replace(/\s+/g,' ').trim();}
function mergeDyn(){
  var arr;try{arr=JSON.parse(localStorage.getItem(DYN_KEY));}catch(e){arr=null;}
  if(!Array.isArray(arr)||!arr.length)return;
  var seen={};QS.forEach(function(q){if(q.en)seen[normEn(q.en)]=true;});
  var map;try{map=JSON.parse(localStorage.getItem(DYN_MAP));}catch(e){map=null;}
  if(!map||typeof map!=='object')map={};
  var maxStatic=0;QS.forEach(function(q){if(typeof q.id==='number'&&q.id>maxStatic)maxStatic=q.id;});
  var seq=+localStorage.getItem(DYN_SEQ)||0;
  if(seq<maxStatic)seq=maxStatic;
  Object.keys(map).forEach(function(k){if(map[k]>seq)seq=map[k];});
  var mapChanged=false;
  arr.forEach(function(d){
    if(!d||typeof d!=='object')return;
    var key=normEn(d.en);
    if(!key)return;
    if(seen[key])return;
    seen[key]=true;
    var id=map[key];
    if(typeof id!=='number'){id=++seq;map[key]=id;mapChanged=true;}
    QS.push({id:id,kind:(d.kind||'単語'),badge:(d.badge||'tango'),jp:(d.jp||''),en:d.en,day:(d.day||today()),k:(d.k||'<p>（この問題の解説はまだないよ。答えと見くらべて覚えてね🌸）</p>'),src:(d.src||'dyn')});
  });
  if(mapChanged)safeSet(DYN_MAP,JSON.stringify(map));
  if(seq>(+localStorage.getItem(DYN_SEQ)||0))safeSet(DYN_SEQ,String(seq));
}
// id未記入の問題に自動採番（既存idは尊重＝既存の保存データを壊さない）
(function(){var m=0;QS.forEach(function(q){if(typeof q.id==='number'&&q.id>m)m=q.id;});QS.forEach(function(q){if(typeof q.id!=='number')q.id=++m;});})();

var PRE='revq_'; // localStorageキー: revq_1 .. revq_17
var BOARD='tokkun_reve_queue'; // 記録ボード連携キー
var GRADUATE=2; // 2回○で卒業
var DUE_DAYS=7;
var SUBJECT='英語'; // ← 3ファイルでここだけ差し替え（英語/数学/国語）
function histKeys(){var ks=[PRE+'hist',BOARD];QS.forEach(function(q){ks.push(PRE+q.id+'_log');});return ks;} // 卒業データrevq_<id>は含めない
function fmtD(ms){var d=new Date(ms);var w=['日','月','火','水','木','金','土'][d.getDay()];return (d.getMonth()+1)+'/'+d.getDate()+'('+w+')';}
function copyText(txt){if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(txt).then(function(){alert('コピーしたよ！先生（AI）にはりつけてね🌸');},function(){window.prompt('コピーして先生にわたしてね',txt);});}else{window.prompt('コピーして先生にわたしてね',txt);}}

function today(){var d=new Date();return (d.getMonth()+1)+'/'+d.getDate();}
function nowMs(){return Date.now();}
function dayNum(ms){var d=new Date(ms);return Math.floor(new Date(d.getFullYear(),d.getMonth(),d.getDate()).getTime()/86400000);}
function epoch(){var k=PRE+'__epoch';var v=+localStorage.getItem(k);if(!v){v=nowMs();safeSet(k,String(v));}return v;}
function clampSt(st){st.cnt=Math.max(0,Math.min(99,(+st.cnt||0)));st.gradTs=(+st.gradTs>0)?+st.gradTs:0;st.mastered=(st.mastered===true);st.lastX=(typeof st.lastX==='string')?st.lastX:'';if(st.mastered)st.cnt=Math.max(st.cnt,GRADUATE);if(st.cnt<GRADUATE&&st.gradTs)st.gradTs=0;return st;}
function stateOf(st){if(st.mastered)return'mastered';if(st.cnt>=GRADUATE){var e=dayNum(nowMs())-dayNum(st.gradTs);return (st.gradTs>0&&e>=0&&e>=DUE_DAYS)?'due':'graduated';}return'learning';}
function safeSet(k,v){try{localStorage.setItem(k,v);return true;}catch(e){return false;}}
function safeRemove(k){try{localStorage.removeItem(k);}catch(e){}}
function load(id){var o;try{o=JSON.parse(localStorage.getItem(PRE+id));}catch(e){o=null;}if(!o||typeof o!=='object')o={cnt:0,lastX:''};if(typeof o.gradTs!=='number'){o.gradTs=(o.cnt>=GRADUATE)?epoch():0;}if(typeof o.mastered!=='boolean')o.mastered=false;return clampSt(o);}
function save(id,st){if(!safeSet(PRE+id,JSON.stringify(st))&&!window._svWarn){window._svWarn=1;alert('きろくが保存できなかったみたい。シークレットモードだと保存できないことがあるよ。ふつうのモードで開いてね🌸');}}

// 記録ボード連携：全体の○総数・✕総数を集計して書き出す
function writeBoard(){
  var o=0,x=0;
  QS.forEach(function(q){
    try{var b=JSON.parse(localStorage.getItem(PRE+q.id+'_log'))||{o:0,x:0};o+=b.o;x+=b.x;}catch(e){}
  });
  safeSet(BOARD, JSON.stringify({o:o,x:x}));
}
function bumpLog(id,key){var b;try{b=JSON.parse(localStorage.getItem(PRE+id+'_log'))||{o:0,x:0};}catch(e){b={o:0,x:0};}b[key]=(b[key]||0)+1;safeSet(PRE+id+'_log',JSON.stringify(b));pushHist(id,key);writeBoard();}
function pushHist(id,key){var h;try{h=JSON.parse(localStorage.getItem(PRE+'hist'))||[];}catch(e){h=[];}h.push({t:nowMs(),id:id,r:key});if(h.length>400)h=h.slice(h.length-400);safeSet(PRE+'hist',JSON.stringify(h));}

function render(){
  var list=document.getElementById('list');list.innerHTML='';
  var remain=0,grad=0;
  QS.forEach(function(q){
    var st=load(q.id);var ph=stateOf(st);
    if(ph==='mastered'||ph==='graduated'){grad++;return;} // 卒業した問題は出さない（dueは復活）
    remain++;
    var isDue=(ph==='due');
    var el=document.createElement('div');el.className='q';el.id='q'+q.id;
    var dateStr=isDue?('🔁 1週間ぶりの定着チェック'):('間違えた日：'+q.day+(st.lastX?'（再×'+st.lastX+'）':''));
    el.innerHTML=
      '<div class="top">'+
        '<span class="badge '+q.badge+'">'+q.kind+'</span>'+
        (isDue?'<span class="badge jukugo">🔁 定着チェック</span>':'')+
        '<span class="date">'+dateStr+'</span>'+
        (isDue?'<span class="cnt">ラスト1問！</span>':'<span class="cnt">○ '+st.cnt+' / '+GRADUATE+'</span>')+
      '</div>'+
      '<div class="jp">'+q.jp+'</div>'+
      '<button class="ans-btn" onclick="toggle('+q.id+',this)">答えを見る</button>'+
      '<div class="ans-box" id="a'+q.id+'">'+
        '<div class="en">'+q.en+'</div>'+
        '<div class="kaisetsu">'+q.k+'</div>'+
        '<div class="grade"><span class="lbl">合ってた？</span>'+
          '<button class="o" onclick="mark('+q.id+',1)">○</button>'+
          '<button class="x" onclick="mark('+q.id+',0)">✕</button>'+
        '</div>'+
      '</div>';
    list.appendChild(el);
  });
  document.getElementById('remain').textContent=remain;
  document.getElementById('grad').textContent=grad;
  var ac=document.getElementById('allclear');
  if(remain===0){ac.classList.add('show');document.getElementById('progress').style.display='none';}
  else{ac.classList.remove('show');document.getElementById('progress').style.display='';}
}

function toggle(id,b){
  var a=document.getElementById('a'+id);var open=a.classList.toggle('open');
  b.textContent=open?'とじる':'答えを見る';
}

function mark(id,ok){
  var st=load(id);var wasDue=(stateOf(st)==='due');
  if(ok)bumpLog(id,'o');else bumpLog(id,'x');
  if(wasDue){
    if(ok){st.mastered=true;save(id,st);var e1=document.getElementById('q'+id);if(e1){e1.classList.add('grad');e1.innerHTML='<div class="grad-note">🌸 定着！1週間あけても覚えてた。もう完ぺき。</div>';}setTimeout(render,900);return;}
    else{st.cnt=0;st.lastX=today();st.gradTs=0;save(id,st);render();return;}
  }
  if(ok){st.cnt=st.cnt+1;}else{st.cnt=0;st.lastX=today();}
  save(id,st);
  if(ok&&st.cnt>=GRADUATE){st.gradTs=nowMs();save(id,st);var e2=document.getElementById('q'+id);if(e2){e2.classList.add('grad');e2.innerHTML='<div class="grad-note">🎉 卒業！7日後にもう一度だけ出るよ。そこで○なら完ぺき！</div>';}setTimeout(render,900);}
  else{render();}
}

function resetAll(){
  if(!confirm('全部の○✕をリセットして、もう一度'+QS.length+'問全部出すよ。いい？'))return;
  QS.forEach(function(q){safeRemove(PRE+q.id);safeRemove(PRE+q.id+'_log');});
  safeSet(BOARD,JSON.stringify({o:0,x:0}));

}

function resetHist(){
  if(!confirm('これまでの「○✕の足あと」と「記録タブ」を消して、ここから本番スタートするよ。\n\n★卒業した問題（できるようになった分）はそのまま残るよ。\nいい？'))return;

function selfCheck(){
  var OK=['tango','jukugo','eisaku'],w=[],ids={};
  QS.forEach(function(q,i){
    var t=q.jp?('「'+String(q.jp).replace(/<[^>]+>/g,'').slice(0,12)+'」'):'';
    var p='QS['+i+']'+t;
    if(OK.indexOf(q.badge)<0)w.push(p+': badge「'+q.badge+'」はCSS未定義（無装飾になる）');
    if(!q.jp||!q.en||!q.k)w.push(p+': jp/en/k のどれかが空');

  });
  if(w.length){
    console.warn('【復習キュー点検】'+w.length+'件:\n'+w.join('\n'));

      var wrap=document.querySelector('.wrap'),ac=document.getElementById('allclear');
      if(wrap&&ac)wrap.insertBefore(d,ac);
    }

}
var VIEW='review';
function getLog(id){var v=localStorage.getItem(PRE+id+'_log');if(!v)return{o:0,x:0};try{var p=JSON.parse(v);return{o:+p.o||0,x:+p.x||0};}catch(e){return{o:0,x:0};}}
function errScore(id){var l=getLog(id);if(l.x===0)return -1;return l.x + l.x/(l.o+l.x);}
function setView(v){
  VIEW=v;
  var sr=document.getElementById('segReview'),sd=document.getElementById('segDict'),sl=document.getElementById('segLog');

  else { if(pg)pg.style.display='none'; if(ac)ac.classList.remove('show'); renderDict(); }
}
function renderDict(){
  var list=document.getElementById('list');if(!list)return;list.innerHTML='';
  var rows=QS.map(function(q){var st=load(q.id),lg=getLog(q.id);return{q:q,st:st,lg:lg,grad:(st.cnt>=GRADUATE)};})

  var done=rows.filter(function(r){return r.grad;}).length;

function redo(id){var st=load(id);st.cnt=GRADUATE-1;st.gradTs=0;st.mastered=false;save(id,st);renderDict();}
function qById(id){for(var i=0;i<QS.length;i++){if(QS[i].id===id)return QS[i];}return null;}
function fmtDT(ms){var d=new Date(ms);var w=['日','月','火','水','木','金','土'][d.getDay()];return (d.getMonth()+1)+'/'+d.getDate()+'('+w+') '+('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2);}
function renderLog(){
  var list=document.getElementById('list');if(!list)return;
  var h;try{h=JSON.parse(localStorage.getItem(PRE+'hist'))||[];}catch(e){h=[];}
  var ctrl='<div style="display:flex;gap:8px;flex-wrap:wrap;margin:0 0 10px">'+
    '<button class="redo" onclick="copyLog(true)">📋 ✕だけコピー</button>'+
    '<button class="redo" onclick="copyLog(false)">📋 ぜんぶコピー</button>'+
    '<button class="reset" style="margin:0" onclick="resetHist()">🗑️ 記録を消して本番スタート</button>'+
    '</div>';
  if(!h.length){list.innerHTML='<div class="dict-note">まだ記録がないよ。「復習」で○✕をつけると、ここに日づけと時刻がたまっていくよ🌸</div>'+ctrl;return;}
  var map={},order=[];
  h.forEach(function(e){var d=new Date(e.t);var ymd=d.getFullYear()*10000+(d.getMonth()+1)*100+d.getDate();var key=(d.getMonth()+1)+'/'+d.getDate();if(!map[ymd]){map[ymd]={ymd:ymd,key:key,o:0,x:0,xs:[]};order.push(ymd);}map[ymd][e.r==='o'?'o':'x']++;if(e.r==='x')map[ymd].xs.push(e);});
  order.sort(function(a,b){return b-a;});
  var html='<div class="dict-note">✕（まちがえた問題）を 日づけごとに まとめたよ。スクショ1枚で先生（AI）に わたせるよ🌸　○は数だけ表示。</div>'+ctrl;
  html+='<div class="dict-row" style="background:#eef2f7;border-color:#cdd9e6"><div class="dict-main"><b>📸 きみ／'+SUBJECT+' まちがえ記録</b></div></div>';
  order.forEach(function(ymd){var d=map[ymd];var tot=d.o+d.x;var rate=tot?Math.round(d.o/tot*100):0;
    html+='<div class="dict-row" style="background:#fbf6ec;border-color:#ecdcc0"><div class="dict-main"><b style="font-size:15px">'+d.key+'</b></div><div class="dict-stat"><span class="cnt-x">✕'+d.x+'</span><span class="cnt-o">○'+d.o+'</span><span class="dict-grad">正答'+rate+'%</span></div></div>';
    if(!d.xs.length){html+='<div style="margin:2px 0 12px;color:#2f6a44;font-weight:700;font-size:13px">　🌸 この日はぜんぶ○！</div>';return;}
    d.xs.slice().reverse().forEach(function(e){var q=qById(e.id);var jp=q?String(q.jp).replace(/<[^>]+>/g,'').slice(0,30):('#'+e.id);html+='<div class="dict-row"><div class="dict-main"><span class="cnt-x" style="font-size:13px">✕</span><span class="date">'+fmtDT(e.t)+'</span><span class="dict-jp">'+jp+'</span></div></div>';});
    html+='<div style="height:8px"></div>';});
  list.innerHTML=html;
}
function copyLog(onlyX){
  var h;try{h=JSON.parse(localStorage.getItem(PRE+'hist'))||[];}catch(e){h=[];}
  var o=0,x=0;h.forEach(function(e){if(e.r==='o')o++;else x++;});
  var range=h.length?(fmtD(h[0].t)+' 〜 '+fmtD(h[h.length-1].t)):'';
  if(onlyX){
    var agg={};h.forEach(function(e){if(e.r!=='x')return;if(!agg[e.id])agg[e.id]={n:0,days:[]};agg[e.id].n++;agg[e.id].days.push(fmtD(e.t));});
    var ids=Object.keys(agg).sort(function(a,b){return agg[b].n-agg[a].n;});
    var L=['=== きみ '+SUBJECT+' まちがえ記録（×だけ・回数順）==='];
    L.push('教科='+SUBJECT+' / 期間='+range+' / 通算 ○'+o+' ✕'+x);
    L.push('※テスト入力の可能性あり。本番開始日より前は弱点に反映しないこと');
    L.push('--- まちがえた問題（×が多い順）---');
    ids.forEach(function(id){var q=qById(+id);var jp=q?String(q.jp).replace(/<[^>]+>/g,''):'(不明)';var en=q&&q.en?String(q.en).replace(/<[^>]+>/g,''):'';var kind=q&&q.kind?q.kind:'';L.push('['+PRE+'#'+id+'] '+kind+' | '+jp+(en?' → 答え:'+en:'')+' | ✕'+agg[id].n+'回 ('+agg[id].days.join(',')+')');});
    if(!ids.length)L.push('（まちがえはまだないよ🌸）');
    L.push('=== END ('+PRE+') ===');copyText(L.join('\n'));
  }else{
    var L2=['=== きみ '+SUBJECT+' 復習記録（全件・時系列）==='];
    L2.push('教科='+SUBJECT+' / 期間='+range+' / 通算 ○'+o+' ✕'+x);
    h.forEach(function(e){var q=qById(e.id);var jp=q?String(q.jp).replace(/<[^>]+>/g,'').slice(0,30):'(不明)';L2.push(PRE+'#'+e.id+' | '+fmtDT(e.t)+' | '+jp+' | '+(e.r==='o'?'○':'✕'));});
    L2.push('=== END ('+PRE+') ===');copyText(L2.join('\n'));
  }
}
function migrate(){if(localStorage.getItem(PRE+'migr1'))return;var now=nowMs();QS.forEach(function(q){var raw=localStorage.getItem(PRE+q.id);if(!raw)return;var st;try{st=JSON.parse(raw);}catch(e){return;}if(!st||typeof st!=='object')return;var ch=false;if(st.cnt>=GRADUATE&&typeof st.gradTs!=='number'){st.gradTs=epoch();ch=true;}if(typeof st.mastered!=='boolean'){st.mastered=false;ch=true;}if(ch)save(q.id,st);});safeSet(PRE+'migr1','1');}
window.onload=function(){
  try{mergeDyn();}catch(e){}
  try{migrate();}catch(e){}
  try{selfCheck();}catch(e){}
  render();
  writeBoard();
  window.addEventListener('scroll',function(){var b=document.getElementById('toTop');if(!b)return;if(window.scrollY>500)b.classList.add('show');else b.classList.remove('show');},{passive:true});
};
</script>
